name: Coverage

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  coverage:
    name: kcov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run kcov via the official image
        run: |
          mkdir -p coverage
          docker run --rm -v "$PWD":/src -w /src kcov/kcov:latest \
            bash -lc '
              apt-get update >/dev/null && apt-get install -y -q bats jq >/dev/null
              kcov \
                --include-path=core,adapters,builtin,commands.sh \
                coverage \
                bats tests/unit tests/integration
            '

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage
          retention-days: 14
