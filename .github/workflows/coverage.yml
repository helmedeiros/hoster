name: Coverage

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  coverage:
    name: kcov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats and jq
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install kcov
        run: |
          sudo apt-get install -y kcov

      - name: Run coverage
        run: |
          mkdir -p coverage
          kcov \
            --include-path=core,adapters,builtin,commands.sh \
            coverage \
            bats tests/unit tests/integration

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage
          retention-days: 14
